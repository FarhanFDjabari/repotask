name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build universal wheel
        run: |
          python -m pip install build
          python -m build --wheel
      - name: Verify universal wheel
        run: |
          python - <<'PY'
          from pathlib import Path

          wheels = list(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, f"Expected one wheel, found: {wheels}"
          assert wheels[0].name.endswith("-py3-none-any.whl"), wheels[0].name
          print(wheels[0])
          PY
      - name: Smoke install wheel
        run: |
          python -m venv wheel-smoke
          wheel-smoke/bin/python -m pip install dist/*.whl
          wheel-smoke/bin/repo-task --version
          wheel-smoke/bin/repo-task --help
      - name: Publish repository release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*.whl

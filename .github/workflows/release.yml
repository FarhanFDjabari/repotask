name: Release macOS Binary

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build native binary
        run: |
          python -m pip install -e ".[dev]"
          pyinstaller --clean --noconfirm repotask.spec
      - name: Smoke test
        run: python scripts/binary_smoke.py dist/repo-task
      - name: Package artifact
        run: |
          codesign --force --deep --sign - dist/repo-task
          codesign --verify --verbose dist/repo-task
          tar -czf "repo-task-${GITHUB_REF_NAME}-macos-arm64.tar.gz" -C dist repo-task
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: repo-task-${{ github.ref_name }}-macos-arm64.tar.gz
